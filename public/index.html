*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  background-color: #081F2D;
}

body {
  display: block;   /* ❌ flex nahi */
}

#root {
  width: 100%;
  min-height: 100vh;
}
